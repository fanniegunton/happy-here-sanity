# Dispatched by netlify/functions/run-monthly-check.js (the Studio
# dashboard's "Run Monthly Check" button), or manually from the Actions tab.
#
# Repo secrets required (Settings → Secrets and variables → Actions):
#   BROWSERBASE_API_KEY
#   SANITY_API_TOKEN

name: Happy Here Monthly Update

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (currently only 'verify')"
        required: false
        default: "verify"
      dry_run:
        description: "Log what would change without writing drafts ('true'/'false')"
        required: false
        default: "false"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run monthly verification
        run: pnpm exec tsx scripts/monthlyVerification.ts
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          MODE: ${{ inputs.mode }}
          DRY_RUN: ${{ inputs.dry_run }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-verification-output
          path: output/
          if-no-files-found: ignore
